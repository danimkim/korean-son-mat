# PostgreSQL profile, used by Docker Compose and production.
# Activate with: --spring.profiles.active=postgres

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/korean_recipes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:korean}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
