# Default profile: in-memory H2 so the app runs with zero setup (mvn spring-boot:run).
# Switch to PostgreSQL with: --spring.profiles.active=postgres (see application-postgres.properties).

spring.application.name=korean-son-mat

# --- Datasource (H2 in-memory) ---
spring.datasource.url=jdbc:h2:mem:korean_recipes;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# --- CORS ---
app.cors.allowed-origins=http://localhost:3000

server.port=8080
